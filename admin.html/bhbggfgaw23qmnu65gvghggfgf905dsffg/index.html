<!DOCTYPE html>
<!--
  admin.html/bhbggfgaw23qmnu65gvghggfgf905dsffg/index.html
  Admin panel: Import Realtime Database JSON export → Cloud Firestore
  Path depth from root: 2 levels  →  firebase-init.js is at "../../firebase-init.js"
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Upload Products to Firestore</title>
  <style>
    body        { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
    h1          { font-size: 1.4rem; margin-bottom: 24px; }
    .row        { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    input[type="file"] { flex: 1; }
    button      { padding: 10px 20px; background: #ff6600; color: #fff;
                  border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #log        { margin-top: 24px; background: #f4f4f4; padding: 16px;
                  border-radius: 6px; white-space: pre-wrap; font-size: 0.85rem;
                  min-height: 80px; max-height: 400px; overflow-y: auto; }
    .ok   { color: green; }
    .err  { color: red;   }
    .info { color: #555;  }
  </style>
</head>
<body>

  <h1>📦 Upload Products to Firestore</h1>
  <p class="info">
    Export your Realtime Database as JSON from the Firebase console, then select
    the file below and click <strong>Upload to Firestore</strong>.
  </p>

  <div class="row">
    <!-- Step 1: pick the exported Realtime DB JSON file -->
    <input type="file" id="jsonFileInput" accept=".json" />

    <!-- Step 2: trigger the upload -->
    <button id="uploadBtn">Upload to Firestore</button>
  </div>

  <pre id="log">Waiting for file…</pre>

  <!-- ── Firebase SDK v10 (modular) via CDN ── -->
  <script type="module">
    // ── Imports ──────────────────────────────────────────────────
    import { db }       from "../../firebase-init.js";
    import {
      collection,
      doc,
      setDoc,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ── DOM refs ─────────────────────────────────────────────────
    const fileInput = document.getElementById("jsonFileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const log       = document.getElementById("log");

    // Append a line to the log panel
    function print(msg, cls = "") {
      const line = document.createElement("span");
      line.className = cls;
      line.textContent = msg + "\n";
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    // ── Upload handler ────────────────────────────────────────────
    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];

      // Validate: a file must be selected
      if (!file) {
        alert("Please select a JSON file first.");
        return;
      }

      // Clear previous log
      log.textContent = "";
      uploadBtn.disabled = true;
      print("📂 Reading file…", "info");

      try {
        // ── 1. Read the JSON file ─────────────────────────────────
        const text = await file.text();
        const jsonData = JSON.parse(text);

        // ── 2. Find the products node ─────────────────────────────
        // The Realtime DB export is usually shaped as:
        //   { "products": { "-Nabc123": { name, price, … }, … } }
        // or just:
        //   { "-Nabc123": { name, price, … }, … }
        // We handle both cases:
        const productsData =
          jsonData.products && typeof jsonData.products === "object"
            ? jsonData.products   // standard RTDB export with "products" key
            : jsonData;           // file already contains only the products map

        const productKeys = Object.keys(productsData);

        if (productKeys.length === 0) {
          print("⚠️  No products found in the JSON file.", "err");
          uploadBtn.disabled = false;
          return;
        }

        print(`✅ Found ${productKeys.length} product(s). Uploading…\n`, "ok");

        // ── 3. Upload each product to Firestore ───────────────────
        // CRITICAL: use the original Realtime DB key as the Firestore
        // document ID so that all existing product IDs remain unchanged.
        const productsCol = collection(db, "products");
        let successCount = 0;
        let errorCount   = 0;

        for (const productId of productKeys) {
          const productData = productsData[productId];

          try {
            // setDoc with a specific doc ID = original RTDB key
            await setDoc(doc(productsCol, productId), {
              ...productData,
              // Optional: record when this product was migrated
              _migratedAt: new Date().toISOString(),
            });
            print(`  ✅ Uploaded: ${productId}  (${productData.name ?? "—"})`, "ok");
            successCount++;
          } catch (docErr) {
            print(`  ❌ Failed:   ${productId}  — ${docErr.message}`, "err");
            errorCount++;
          }
        }

        // ── 4. Summary ────────────────────────────────────────────
        print("\n─────────────────────────────────────", "info");
        print(`Done! ✅ ${successCount} uploaded, ❌ ${errorCount} failed.`, successCount > 0 ? "ok" : "err");

      } catch (parseErr) {
        print(`❌ Could not parse JSON: ${parseErr.message}`, "err");
      } finally {
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
